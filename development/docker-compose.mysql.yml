---
services:
  nautobot:
    environment:
      - "NAUTOBOT_DB_ENGINE=django.db.backends.mysql"
    env_file:
      - "development.env"
      - "creds.env"
      - "development_mysql.env"
  worker:
    environment:
      - "NAUTOBOT_DB_ENGINE=django.db.backends.mysql"
    env_file:
      - "development.env"
      - "creds.env"
      - "development_mysql.env"
  beat:
    environment:
      - "NAUTOBOT_DB_ENGINE=django.db.backends.mysql"
    env_file:
      - "development.env"
      - "creds.env"
      - "development_mysql.env"
  db:
    image: "mysql:8"
    command:
      - "--max_connections=1000"
    env_file:
      - "development.env"
      - "creds.env"
      - "development_mysql.env"
    volumes:
      - "mysql_data:/var/lib/mysql"
    healthcheck:
      test: "mysql -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD --execute 'SHOW DATABASES;'"
      interval: "10s"
      timeout: "5s"
      start_period: "30s"
      retries: 10
volumes:
  mysql_data: {}
